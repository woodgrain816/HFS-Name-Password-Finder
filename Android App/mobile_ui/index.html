<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e1e2e">
<title>HFS Finder</title>
<style>
  :root { --bg:#1e1e2e; --surface:#2a2a3d; --surface2:#353550; --accent:#7c3aed;
          --accent2:#6d28d9; --text:#e2e8f0; --muted:#94a3b8; --success:#22c55e;
          --danger:#ef4444; --border:#3f3f5a; --radius:12px; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI",sans-serif;
         min-height:100vh; }
  /* Login */
  #login { display:flex; flex-direction:column; align-items:center; justify-content:center;
           min-height:100vh; padding:24px; gap:12px; }
  .title { font-size:22px; font-weight:700; margin-bottom:4px; }
  .sub   { color:var(--muted); font-size:13px; text-align:center; margin-bottom:8px; }
  .lbl   { width:100%; max-width:360px; font-size:12px; color:var(--muted); margin-bottom:2px; }
  input  { width:100%; max-width:360px; background:var(--surface); color:var(--text);
           border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
           font-size:16px; outline:none; }
  input:focus { border-color:var(--accent); }
  .btn   { width:100%; max-width:360px; background:var(--accent); color:#fff; border:none;
           border-radius:var(--radius); padding:14px; font-size:16px; font-weight:700; cursor:pointer; }
  .btn:active { background:var(--accent2); }
  .btn.danger { background:var(--danger); }
  .err   { color:var(--danger); font-size:13px; text-align:center; }
  /* App */
  #app { display:none; flex-direction:column; height:100vh; }
  .hdr { background:var(--surface); padding:16px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .hdr-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .hdr-title { font-size:18px; font-weight:700; }
  .hdr-count { font-size:12px; color:var(--accent); font-weight:600; }
  .sbox { display:flex; gap:8px; }
  .sinput { flex:1; background:var(--bg); color:var(--text); border:1px solid var(--border);
            border-radius:var(--radius); padding:10px 14px; font-size:15px; outline:none; }
  .sinput:focus { border-color:var(--accent); }
  .rbtn { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
          padding:10px 14px; color:var(--text); font-size:18px; cursor:pointer; }
  /* List */
  #list { flex:1; overflow-y:auto; padding:8px 12px; }
  .card { background:var(--surface); border-radius:var(--radius); padding:14px 16px;
          margin-bottom:8px; border:1px solid var(--border); cursor:pointer; }
  .card:active { border-color:var(--accent); }
  .c-user { font-size:16px; font-weight:700; margin-bottom:4px; }
  .c-folder { font-size:13px; color:var(--muted); }
  .c-dots { font-size:13px; color:var(--border); letter-spacing:2px; margin-top:4px; }
  .empty { text-align:center; color:var(--muted); padding:40px 20px; font-size:15px; }
  /* Sheet */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99; display:none; }
  .overlay.show { display:block; }
  #sheet { position:fixed; bottom:0; left:0; right:0; background:var(--surface);
           border-top:1px solid var(--border); border-radius:20px 20px 0 0;
           padding:20px 20px 40px; transform:translateY(100%);
           transition:transform .3s cubic-bezier(.4,0,.2,1); z-index:100; }
  #sheet.open { transform:translateY(0); }
  .handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .s-user { font-size:22px; font-weight:700; margin-bottom:4px; }
  .s-folder { font-size:14px; color:var(--muted); margin-bottom:20px; }
  .pw-row { background:var(--bg); border-radius:var(--radius); padding:16px;
            margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .pw-val { font-size:18px; font-weight:600; font-family:monospace; letter-spacing:1px; }
  .pw-tog { background:var(--surface2); border:none; border-radius:8px; padding:8px 14px;
            color:var(--text); font-size:13px; cursor:pointer; }
  .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
           background:#333; color:#fff; padding:10px 20px; border-radius:20px;
           font-size:14px; z-index:200; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }
  .loading { display:flex; align-items:center; justify-content:center; gap:10px;
             padding:40px; color:var(--muted); }
  .spin { width:20px; height:20px; border:2px solid var(--border);
          border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="login">
  <div class="title">HFS Password Finder</div>
  <div class="sub">Connects directly to your HFS file server</div>
  <div class="lbl">HFS Server URL</div>
  <input type="url" id="f-url" placeholder="http://ww2.wg816.com:82">
  <div class="lbl">Username</div>
  <input type="text" id="f-user" placeholder="wg">
  <div class="lbl">Password</div>
  <input type="password" id="f-pass" placeholder="Password">
  <div id="f-err" class="err"></div>
  <button class="btn" onclick="doConnect()">Connect</button>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">HFS Finder</div>
      <div id="count" class="hdr-count"></div>
    </div>
    <div class="sbox">
      <input type="search" id="q" class="sinput" placeholder="Search name or folder..." oninput="doFilter()">
      <button class="rbtn" onclick="doRefresh()">&#x21bb;</button>
    </div>
  </div>
  <div id="list"></div>
</div>

<div class="overlay" id="ov" onclick="closeSheet()"></div>
<div id="sheet">
  <div class="handle"></div>
  <div class="s-user" id="su"></div>
  <div class="s-folder" id="sf"></div>
  <div class="pw-row">
    <div class="pw-val" id="sp"></div>
    <button class="pw-tog" id="pt" onclick="togPw()">Show</button>
  </div>
  <button class="btn" onclick="copyPw()">Copy Username &amp; Password</button>
  <div style="height:12px"></div>
  <button class="btn danger" onclick="closeSheet()">Close</button>
</div>
<div class="toast" id="toast"></div>

<script>
var URL_="", USER_="", PASS_="";
var allAccts=[], folderMap={}, cur=null, pwShown=false;

/* ── Persistence via Android bridge ─────────────────────────────────────── */
function loadPrefs() {
  try {
    var u = Android.getPref("url","http://ww2.wg816.com:82");
    var n = Android.getPref("user","wg");
    if(u) document.getElementById("f-url").value = u;
    if(n) document.getElementById("f-user").value = n;
  } catch(e) {
    document.getElementById("f-url").value = "http://ww2.wg816.com:82";
    document.getElementById("f-user").value = "wg";
  }
}
function savePrefs() {
  try { Android.setPref("url",URL_); Android.setPref("user",USER_); } catch(e){}
}

/* ── Connect ────────────────────────────────────────────────────────────── */
function doConnect() {
  URL_  = document.getElementById("f-url").value.trim().replace(/\/$/,"");
  USER_ = document.getElementById("f-user").value.trim();
  PASS_ = document.getElementById("f-pass").value;
  if(!URL_||!USER_||!PASS_){ showErr("Fill in all fields"); return; }
  showErr("Connecting...");
  setTimeout(function(){ doLoad(); }, 50);
}
function showErr(m){ document.getElementById("f-err").textContent=m; }

function doLoad() {
  try {
    // 1. Fetch hfs.ini directly from HFS
    var ini = Android.fetchText(URL_+"/HFS/hfs.ini", USER_, PASS_);
    if(ini.indexOf("ERROR:")==0) throw ini;

    // 2. Get folder map from newest .vfs
    var vfsJson = Android.listVfsFiles(URL_+"/HFS/", USER_, PASS_);
    var vfsList = JSON.parse(vfsJson);
    if(vfsList.length > 0) {
      var newest = vfsList[vfsList.length - 1];
      var mapJson = Android.parseFolderMap(
        URL_+"/HFS/"+encodeURIComponent(newest), USER_, PASS_);
      folderMap = JSON.parse(mapJson);
    }

    // 3. Parse accounts
    allAccts = parseAccounts(ini);
    document.getElementById("count").textContent = allAccts.length + " accounts";
    savePrefs();

    // Show app
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    doFilter();
  } catch(e) {
    showErr("Failed: " + e);
  }
}

function doRefresh() {
  document.getElementById("list").innerHTML =
    '<div class="loading"><div class="spin"></div> Refreshing...</div>';
  setTimeout(function(){
    try {
      var ini = Android.fetchText(URL_+"/HFS/hfs.ini", USER_, PASS_);
      if(ini.indexOf("ERROR:")!=0) {
        allAccts = parseAccounts(ini);
        document.getElementById("count").textContent = allAccts.length+" accounts";
      }
      doFilter();
      toast("Refreshed");
    } catch(e) { toast("Error: "+e); doFilter(); }
  }, 50);
}

/* ── Parse accounts from ini text ───────────────────────────────────────── */
function parseAccounts(text) {
  var accts = [];
  var lines = text.split("\n");
  for(var i=0; i<lines.length; i++) {
    var line = lines[i].replace(/^\s+|\s+$/g,"");
    if(line.indexOf("accounts=")!=0) continue;
    var data = line.substring(9);
    var parts = data.split("|");
    var c = {};
    for(var p=0; p<parts.length; p++) {
      var s = parts[p];
      if(!s) continue;
      if(s.indexOf("login:")==0) {
        if(c.b64) accts.push(buildAcct(c));
        c = {b64: s.substring(6)};
      } else if(s.indexOf("enabled:")==0) c.enabled=s.substring(8);
      else if(s.indexOf("group:")==0) c.group=s.substring(6);
      else if(s.indexOf("link:")==0) c.link=s.substring(5).replace(/;$/,"");
    }
    if(c.b64) accts.push(buildAcct(c));
    break;
  }
  return accts;
}

function buildAcct(r) {
  var dec;
  try { dec = atob(r.b64); } catch(e) { dec = r.b64; }
  var idx = dec.indexOf(":");
  var user = idx>=0 ? dec.substring(0,idx) : dec;
  var pass = idx>=0 ? dec.substring(idx+1) : "";
  var folders = folderMap[user.toLowerCase()] || [];
  return { username:user, password:pass, folder:folders.join(" / "),
           enabled:r.enabled||"", link:r.link||"" };
}

/* ── Display ────────────────────────────────────────────────────────────── */
function doFilter() {
  var q = document.getElementById("q").value.replace(/^\s+|\s+$/g,"").toLowerCase();
  var list = allAccts;
  if(q) {
    list = [];
    for(var i=0; i<allAccts.length; i++) {
      var a = allAccts[i];
      if(a.username.toLowerCase().indexOf(q)>=0 ||
         a.folder.toLowerCase().indexOf(q)>=0 ||
         a.password.toLowerCase().indexOf(q)>=0) list.push(a);
    }
  }
  render(list);
}

function render(accts) {
  var el = document.getElementById("list");
  if(!accts.length){ el.innerHTML='<div class="empty">No accounts found</div>'; return; }
  var h = "";
  for(var i=0; i<accts.length; i++) {
    var a = accts[i];
    var dots = ""; for(var d=0;d<a.password.length;d++) dots+="\u2022";
    h += '<div class="card" data-i="'+i+'" onclick="openSheet(\''+
         esc2(a.username)+'\',\''+esc2(a.password)+'\',\''+esc2(a.folder)+'\')">'+
         '<div class="c-user">'+esc(a.username)+'</div>'+
         (a.folder?'<div class="c-folder">\uD83D\uDCC1 '+esc(a.folder)+'</div>':'')+
         '<div class="c-dots">'+dots+'</div></div>';
  }
  el.innerHTML = h;
}

/* ── Detail sheet ───────────────────────────────────────────────────────── */
function openSheet(user, pass, folder) {
  cur = {u:user, p:pass, f:folder};
  pwShown = false;
  document.getElementById("su").textContent = user;
  document.getElementById("sf").textContent = folder ? "\uD83D\uDCC1 "+folder : "";
  var dots=""; for(var d=0;d<pass.length;d++) dots+="\u2022";
  document.getElementById("sp").textContent = dots;
  document.getElementById("pt").textContent = "Show";
  document.getElementById("sheet").classList.add("open");
  document.getElementById("ov").classList.add("show");
}
function closeSheet() {
  document.getElementById("sheet").classList.remove("open");
  document.getElementById("ov").classList.remove("show"); cur=null;
}
function togPw() {
  pwShown=!pwShown;
  var dots=""; if(!pwShown) for(var d=0;d<cur.p.length;d++) dots+="\u2022";
  document.getElementById("sp").textContent = pwShown ? cur.p : dots;
  document.getElementById("pt").textContent = pwShown ? "Hide" : "Show";
}
function copyPw() {
  if(!cur) return;
  var t = cur.u+" "+cur.p;
  try {
    navigator.clipboard.writeText(t).then(function(){toast("Copied!")});
  } catch(e) {
    var ta=document.createElement("textarea"); ta.value=t;
    document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    toast("Copied!");
  }
}

/* ── Util ───────────────────────────────────────────────────────────────── */
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function esc2(s){ return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }
var _tt;
function toast(m){ var e=document.getElementById("toast"); e.textContent=m;
  e.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(function(){e.classList.remove("show");},2500); }
window.onload = loadPrefs;
</script>
</body>
</html>
